name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy AI Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy Backend
        working-directory: ai-engine
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_BACKEND }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy Frontend
        run: |
          flyctl deploy --remote-only \
            --build-arg VITE_GEMINI_API_KEY="${{ secrets.VITE_GEMINI_API_KEY }}" \
            --build-arg VITE_AI_BACKEND_URL="https://tradelense-ai-engine.fly.dev" \
            --build-arg VITE_APPWRITE_ENDPOINT="${{ secrets.VITE_APPWRITE_ENDPOINT }}" \
            --build-arg VITE_APPWRITE_PROJECT_ID="${{ secrets.VITE_APPWRITE_PROJECT_ID }}" \
            --build-arg VITE_GA_MEASUREMENT_ID="${{ secrets.VITE_GA_MEASUREMENT_ID }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_FRONTEND }}
