# fly.toml app configuration file generated for tradelense-ai-engine on 2026-03-13T23:07:19+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tradelense-ai-engine'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"


[mounts]
  source = "tradelense_data"
  destination = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
